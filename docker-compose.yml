services:
  app:
    build:
      context: .
      target: app
    volumes:
      - .:/var/www/html          # código fuente en vivo
      - vendor:/var/www/html/vendor  # vendor aislado del host Windows
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sgo_tublood}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  queue:
    build:
      context: .
      target: app
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    env_file: .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  vite:
    image: node:22-alpine
    working_dir: /app
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development

volumes:
  db_data:
  vendor:
  node_modules:
